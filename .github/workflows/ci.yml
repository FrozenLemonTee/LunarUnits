name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: check, format, info and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Post install
        run: |
          moon version --all
          moon update

      - name: Check
        run: moon check --target all

      - name: Format check
        run: |
          moon fmt
          git diff --exit-code

      - name: Generated interface check
        run: |
          moon info
          git diff --exit-code

      - name: Test
        run: moon test --target all

      # Coverage is informational only: an uncovered line should not fail CI.
      - name: Coverage report
        run: |
          moon test --enable-coverage
          moon coverage analyze || true
